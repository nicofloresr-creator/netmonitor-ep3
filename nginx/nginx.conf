# ──────────────────────────────────────────────────────────────────
# NGINX Reverse Proxy — nginx.conf
# INY1105 Infraestructura de Aplicaciones I — Duoc UC
#
# Enruta tráfico HTTP (puerto 80) hacia myapp_container (puerto 5000).
# El estudiante puede ajustar timeouts y headers según necesidad.
# ──────────────────────────────────────────────────────────────────

upstream netmonitor_app {
    server myapp:5000;
}

server {
    listen 80;
    server_name _;

    # Logs acceso y error
    access_log /var/log/nginx/netmonitor_access.log;
    error_log  /var/log/nginx/netmonitor_error.log warn;

    # Health check propio de NGINX (no redirige al backend)
    location /nginx-health {
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy al contenedor de la aplicación
    location / {
        proxy_pass         http://netmonitor_app;
        proxy_http_version 1.1;

        # Headers de proxy estándar
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts (ajustar si la app tarda más en responder)
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Soporte para Server-Sent Events (futuras extensiones)
        proxy_buffering    off;
        proxy_cache        off;
    }
}
